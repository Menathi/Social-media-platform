<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dispatch — Log in</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="container">
  <div class="card auth-card">
    <h1>Dispatch</h1>
    <p class="sub">Log in to your account.</p>
    <form id="loginForm">
      <label for="emailOrUsername">Email or username</label>
      <input id="emailOrUsername" required />
      <label for="password">Password</label>
      <input id="password" type="password" required />
      <button type="submit" class="primary">Log in</button>
      <div id="errorMsg" class="error-msg"></div>
    </form>
    <div class="switch">No account? <a href="/register.html">Create one</a></div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorEl = document.getElementById('errorMsg');
  errorEl.textContent = '';
  try {
    await api.post('/api/auth/login', {
      emailOrUsername: document.getElementById('emailOrUsername').value.trim(),
      password: document.getElementById('password').value,
    });
    window.location.href = '/index.html';
  } catch (err) {
    errorEl.textContent = err.message;
  }
});
</script>
</body>
</html>
